# Minimal single-GPU SFT smoke test.
# This config is intended for quickly validating the training loop and artifacts.

experiment:
  name: "minimal_sft_qwen3_0_6b"
  stage: "sft"
  seed: 42
  output_dir: "outputs/minimal_sft"

runtime:
  device: "auto"
  precision: "bf16"
  deterministic: false
  tp_size: 1
  dp_size: 1
  inference_backend: "custom"
  enable_comm_overlap: false

model:
  name_or_path: "./models/Qwen3-0.6B"
  max_seq_len: 256
  trust_remote_code: true
  use_flash_attn: false
  attention_backend: "sdpa"

data:
  dataset_name: "openai/gsm8k"
  dataset_config: "main"
  split: "train"
  max_samples: 8
  prompt_template: "qwen3_math"
  prompt_field: "question"
  input_field: null
  response_field: "answer"
  answer_field: "answer"

training:
  mode: "sft"
  total_iterations: 1
  batch_size: 1
  train_steps_per_iteration: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  zero_stage: 0
  lr_scheduler: "constant"
  warmup_steps: 0
  min_lr_ratio: 1.0

lora:
  enabled: true
  rank: 8
  alpha: 16
  dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

inference_preview:
  enabled: false
  max_tokens: 1
  temperature: 0.7
  top_p: 0.95

eval:
  max_tokens: 64
  num_prompts: 1

checkpoint:
  save_enabled: false
  save_dir: "checkpoints/minimal_sft"
  save_interval: 0
  resume_from: null

profiling:
  enabled: false
  interval: 10
