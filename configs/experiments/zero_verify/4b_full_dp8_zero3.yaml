# ZeRO 生效验证: Qwen3-4B 全量 SFT + standard + TP1×DP8 (纯DP, world_size=8) + ZeRO-3
# 目标: 8路DP分片倍数最大、无TP干扰; 验证稳态 z1>z2>z3 递减
# 前提: dp_size=8 (ZeRO 在 dp_group 8路分片) + lora_rank=0 (全量)
#
# Usage:
#   torchrun --nproc_per_node=8 scripts/run_colocate.py --config configs/experiments/zero_verify/4b_full_dp8_zero3.yaml --inference-backend custom

experiment:
  name: "4b_full_dp8_zero3"
  stage: "sft"
  seed: 42
  output_dir: "outputs/zero_verify/zero3"

runtime:
  device: "auto"
  precision: "bf16"
  tp_size: 1
  dp_size: 8
  inference_backend: "custom"
  deterministic: false
  enable_comm_overlap: false

model:
  name_or_path: "./models/Qwen3-4B"
  max_seq_len: 512
  trust_remote_code: true
  use_flash_attn: false
  attention_backend: "standard"

data:
  dataset_name: "yahma/alpaca-cleaned"
  dataset_config: null
  split: "train"
  max_samples: 1000
  prompt_template: "qwen3_instruction"
  prompt_field: "instruction"
  input_field: "input"
  response_field: "output"
  answer_field: null

training:
  mode: "sft"
  zero_stage: 3
  total_iterations: 15
  batch_size: 1
  train_steps_per_iteration: 1
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 5
  min_lr_ratio: 0.1

lora:
  enabled: false
  rank: 0
  alpha: 0
  dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

distributed:
  zero_stage: 3

inference_preview:
  enabled: false
  max_tokens: 1
  temperature: 0.7
  top_p: 0.95

eval:
  max_tokens: 1
  num_prompts: 0

checkpoint:
  save_dir: "checkpoints/zero_verify/zero3"
  save_interval: 9999
  save_enabled: false
  resume_from: null

profiling:
  enabled: true
  interval: 10
  memory_breakdown: true
  compute_mfu: true
  track_communication: true
  metrics:
    - peak_memory_gb
    - model_memory_gb
    - optimizer_memory_gb
    - gradient_memory_gb
    - activation_memory_gb
    - memory_utilization_pct
    - mfu_pct
    - step_time_ms
    - tokens_per_sec
    - samples_per_sec
    - comm_time_ratio
    - allreduce_latency_ms
    - comm_volume_mb
    - loss
    - grad_norm
    - learning_rate
